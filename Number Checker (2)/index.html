<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premium Number Checker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding:40px;
            border-radius:20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align:center;
            width:350px;
            color:#fff;
        }

        h1{
            margin-bottom:20px;
            font-weight:600;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            margin-bottom:15px;
            outline:none;
            font-size:14px;
        }

        input:focus{
            box-shadow:0 0 0 2px #fff;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#ffffff;
            color:#764ba2;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#000;
            color:#fff;
            transform:scale(1.05);
        }

        #result{
            margin-top:15px;
            font-weight:500;
            background: rgba(255,255,255,0.25);
            color:#fff;
        }

        .footer{
            margin-top:20px;
            font-size:12px;
            opacity:0.8;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Number Checker</h1>

    <form onsubmit="getNumber(); return false;">
        <label>Enter a number</label>
        <input type="number" id="num1" placeholder="Type your number here" required>

        <button type="submit">Check Now</button>
    </form>

    <input type="text" id="result" readonly placeholder="Result will appear here">

    <div class="footer">
        Designed by Mian Haseeb Nasir
    </div>
</div>

<script>
    function getNumber() {
        let userName = prompt('Enter your name');
        let number = Number(document.getElementById('num1').value);

        if (number % 2 === 0) {
            document.getElementById('result').value = 
            `${userName}, ${number} is an EVEN number ✅`;
        } else {
            document.getElementById('result').value = 
            `${userName}, ${number} is an ODD number 🔥`;
        }
    }
</script>

</body>
</html>
